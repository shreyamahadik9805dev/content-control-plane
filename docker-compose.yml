services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ccp
      POSTGRES_PASSWORD: ccp
      POSTGRES_DB: ccp
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ccp -d ccp"]
      interval: 3s
      timeout: 5s
      retries: 10

  migrate:
    image: migrate/migrate:v4.17.1
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./migrations:/migrations
    command:
      [
        "-path",
        "/migrations",
        "-database",
        "postgres://ccp:ccp@postgres:5432/ccp?sslmode=disable",
        "up",
      ]
    restart: on-failure

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      HTTP_ADDR: ":8080"
    ports:
      - "8080:8080"

volumes:
  pgdata:
