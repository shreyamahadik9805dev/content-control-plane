services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ccp
      POSTGRES_PASSWORD: ccp
      POSTGRES_DB: ccp
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ccp -d ccp"]
      interval: 3s
      timeout: 5s
      retries: 10

  migrate:
    image: migrate/migrate:v4.17.1
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./migrations:/migrations
    command:
      [
        "-path",
        "/migrations",
        "-database",
        "postgres://ccp:ccp@postgres:5432/ccp?sslmode=disable",
        "up",
      ]
    restart: on-failure

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      HTTP_ADDR: ":8080"
      DATABASE_URL: postgres://ccp:ccp@postgres:5432/ccp?sslmode=disable
      ITUNES_BASE_URL: https://itunes.apple.com
      # Set false to call Apple’s API from the container (needs outbound network).
      ITUNES_MOCK: "true"
      CACHE_TTL_SECONDS: "30"
      ENV: development
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      - backend
    environment:
      # Browser on your machine calls the API at the host-mapped backend port.
      VITE_API_URL: http://localhost:8080
    ports:
      - "5173:5173"

volumes:
  pgdata:
